syntax  : 0.1.0
engine  :
  kind : PISA
  flags: [ ]

elements:
  - ptr : 0
    kind: state
    data:
      kind  : persistent
      fields:
        - slot : 0
          label: name
          type : string
        - slot : 1
          label: symbol
          type : string
        - slot : 2
          label: supply
          type : uint64
        - slot : 3
          label: balances
          type : map[address]uint64
        - slot : 4
          label: allowances
          type : map[address]map[address]uint64

  - ptr : 1
    kind: routine
    deps: [ 0 ]
    data:
      name    : Seeder!
      kind    : deployer
      accepts :
        - slot : 0
          label: name
          type : string
        - slot : 1
          label: symbol
          type : string
        - slot : 2
          label: supply
          type : uint64
        - slot : 3
          label: seeder
          type : address
      executes:
        bin: [
          0x04, 0x00, 0x00,         # obtain $0 &0      // $0 = accepts::name
          0x81, 0x00, 0x00,         # psave $0 &0       // p.storage::name = $0
          0x04, 0x00, 0x01,         # obtain $0 &1      // $0 = accepts::symbol
          0x81, 0x00, 0x01,         # psave $0 &1       // p.storage::symbol = $0
          0x04, 0x00, 0x02,         # obtain $0 &2      // $0 = accepts::supply
          0x81, 0x00, 0x02,         # psave $0 &2       // p.storage::supply = $0
          0x80, 0x01, 0x03,         # pload $1 &3       // $1 = p.storage::balances
          0x04, 0x02, 0x03,         # obtain $2 &3      // $2 = accepts::seeder
          0x54, 0x01, 0x02, 0x00,   # setidx $1 $2 $0   // $1[$2] = $0
          0x81, 0x01, 0x03,         # psave $1 &3       // p.storage::balances = $1
        ]

  - ptr : 2
    kind: constant
    data:
      type : uint64
      value: 0x030a

  - ptr : 3
    kind: typedef
    data: map[address]uint64

  - ptr : 4
    kind: routine
    deps: [ 0 ]
    data:
      name    : Name
      kind    : invokable
      returns :
        - slot : 0
          label: name
          type : string
      executes:
        bin: [
          0x80, 0x00, 0x00,         # pload $0 &0    // $0 = p.storage::name
          0x05, 0x00, 0x00,         # yield $0 &0    // returns::name = $0
        ]

  - ptr : 5
    kind: routine
    deps: [ 0 ]
    data:
      name    : Symbol
      kind    : invokable
      returns :
        - slot : 0
          label: symbol
          type : string
      executes:
        bin: [
          0x80, 0x00, 0x01,         # pload $0 &1    // $0 = p.storage::symbol
          0x05, 0x00, 0x00,         # yield $0 &0    // returns::symbol = $0
        ]

  - ptr : 6
    kind: routine
    deps: [ 0 ]
    data:
      name    : Decimals
      kind    : invokable
      returns :
        - slot : 0
          label: decimals
          type : uint64
      executes:
        bin: [
          0x11, 0x00, 0x02,         # ldptr1 $0 0x2     // $0 = Ptr(0x2)
          0x10, 0x00, 0x00,         # const $0 $0       // $0 = constant @ $0
          0x05, 0x00, 0x00,         # yield $0 &0       // returns::decimals = $0
        ]

  - ptr : 7
    kind: routine
    deps: [ 0 ]
    data:
      name    : TotalSupply
      kind    : invokable
      returns :
        - slot : 0
          label: supply
          type : uint64
      executes:
        bin: [
          0x80, 0x00, 0x02,         # pload $0 &2     // $0 = p.storage::supply
          0x05, 0x00, 0x00,         # yield $0 &0     // returns::symbol = $0
        ]

  - ptr : 8
    kind: routine
    deps: [ 0 ]
    data:
      name    : BalanceOf
      kind    : invokable
      accepts :
        - slot : 0
          label: addr
          type : address
      returns :
        - slot : 0
          label: balance
          type : uint64
      executes:
        bin: [
          0x80, 0x00, 0x03,         # pload $0 &3         // $0 = p.storage::supply
          0x04, 0x01, 0x00,         # obtain $1 &0        // $1 = accepts::addr
          0x53, 0x02, 0x00, 0x01,   # getidx $2 $0 $1     // $2 = $0[$1]
          0x05, 0x02, 0x00,         # yield $2 &0         // returns::balance = $2
        ]

  - ptr : 9
    kind: routine
    deps: [ 0 ]
    data:
      name    : Allowance
      kind    : invokable
      accepts :
        - slot : 0
          label: owner
          type : address
        - slot : 1
          label: spender
          type : address
      returns :
        - slot : 0
          label: allowance
          type : uint64
      executes:
        bin: [
          0x80, 0x00, 0x04,         # pload $0 &4         // $0 = storage::allowances
          0x04, 0x01, 0x00,         # obtain $1 &0        // $1 = accepts::owner
          0x53, 0x02, 0x00, 0x01,   # getidx $2 $0 $1     // $2 = $0[$1]
          0x04, 0x03, 0x01,         # obtain $3 &1        // $3 = accepts::spender
          0x53, 0x04, 0x02, 0x03,   # getidx $4 $2 $3     // $4 = $2[$3]
          0x05, 0x04, 0x00,         # yield $4 &0         // returns::allowance = $4
        ]

  - ptr : 10
    kind: routine
    deps: [ 0, 3 ]
    data:
      name    : Approve!
      kind    : invokable
      accepts :
        - slot : 0
          label: owner
          type : address
        - slot : 1
          label: spender
          type : address
        - slot : 2
          label: amount
          type : uint64
      returns :
        - slot : 0
          label: ok
          type : bool
      executes:
        bin: [
          0x80, 0x0, 0x4,           # pload $0 &4       // $0 = p.storage::allowances
          0x04, 0x1, 0x0,           # obtain $1 &0      // $1 = accepts::owner
          0x53, 0x2, 0x0, 0x1,      # getidx $2 $0 $1   // $2 = $0[$1]
          0x20, 0x3, 0x2,           # isnull $3 $2      // $3 = isnull($2)
          0x62, 0x3, 0x3,           # not $3 $3         // $3 = !$3
          0x11, 0x4, 0xA,           # ldptr1 $4 0xA     // $4 = Ptr(0xA)
          0x03, 0x4, 0x3,           # jumpi $4 $3       // if $3 -> jump to line $4 (0xA)
          0x11, 0x4, 0x0,           # ldptr1 $4 0x0     // $4 = Ptr(0x0)
          0x28, 0x4, 0x4,           # make $4 $4        // $4 = build typedef @ $4 (0x0)
          0x24, 0x2, 0x4,           # copy $2 $4        // $2 = $4
          0x1,                      # dest              // jump destination (line 0xA)
          0x04, 0x3, 0x1,           # obtain $3 &1      // $3 = accepts::spender
          0x04, 0x4, 0x2,           # obtain $4 &2      // $4 = accepts::amount
          0x54, 0x2, 0x3, 0x4,      # setidx $2 $3 $4   // $2[$3] = $4
          0x54, 0x0, 0x1, 0x2,      # setidx $0 $1 $2   // $0[$1] = $2
          0x81, 0x0, 0x4,           # psave $0 &4       // p.storage::allowances = $0
          0x29, 0x0, 0x1,           # pmake $0 0x1      // $0 = make(bool)
          0x62, 0x0, 0x0,           # not $0 $0         // $0 = !$0
          0x05, 0x0, 0x0,           # yield $0 &0       // returns::ok = $0
        ]

  - ptr : 11
    kind: routine
    deps: [ 0 ]
    data:
      name    : Transfer!
      kind    : invokable
      accepts :
        - slot : 0
          label: from
          type : address
        - slot : 1
          label: to
          type : address
        - slot : 2
          label: amount
          type : uint64
      returns :
        - slot : 0
          label: ok
          type : bool
      executes:
        bin: [
          0x80, 0x0, 0x3,           # pload $0 &3       // $0 = storage::balances
          0x04, 0x1, 0x0,           # obtain $1 &0      // $1 = accepts::from
          0x53, 0x2, 0x0, 0x1,      # getidx $2 $0 $1   // $2 = $0[$1]
          0x04, 0x3, 0x2,           # obtain $3 &2      // $3 = accepts::amount
          0x44, 0x4, 0x3, 0x2,      # lt $4 $3 $2       // $4 = $3 < $2
          0x11, 0x5, 0xA,           # ldptr1 $5 0xA     // $5 = Ptr(0xA)
          0x03, 0x5, 0x4,           # jumpi $5 $4       // if $4 -> jump to line $5 (0xA)
          0x29, 0x0, 0x1,           # pmake $0 0x1      // $0 = make(bool)
          0x05, 0x0, 0x0,           # yield $0 &0       // returns::ok = $0
          0x0,                      # term              // terminate routine
          0x1,                      # dest              // jump destination (line 0xA)
          0x66, 0x4, 0x2, 0x3,      # sub $4 $2 $3      // $4 = $2 - $3
          0x54, 0x0, 0x1, 0x4,      # setidx $0 $1 $4   // $0[$1] = $4
          0x04, 0x5, 0x1,           # obtain $5 &1      // $5 = accepts::to
          0x53, 0x4, 0x0, 0x5,      # getidx $4 $0 $5   // $4 = $0[$5]
          0x65, 0x6, 0x4, 0x3,      # add $6 $4 $3      // $6 = $4 + $3
          0x54, 0x0, 0x5, 0x6,      # setidx $0 $5 $6   // $0[$5] = $6
          0x81, 0x0, 0x3,           # psave $0 &3       // p.storage::balances = $0
          0x29, 0x0, 0x1,           # pmake $0 0x1      // $0 = make(bool)
          0x62, 0x0, 0x0,           # not $0 $0         // $0 = !$0
          0x05, 0x0, 0x0,           # yield $0 &0       // returns::ok = $0
        ]

  - ptr : 12
    kind: routine
    deps: [ 0 ]
    data:
      name    : Mint!
      kind    : invokable
      accepts :
        - slot : 0
          label: amount
          type : uint64
        - slot : 1
          label: addr
          type : address
      returns :
        - slot : 0
          label: ok
          type : bool
      executes:
        bin: [
          0x80, 0x0, 0x2,           # pload $0 &2       // $0 = p.storage::supply
          0x04, 0x1, 0x0,           # obtain $1 &0      // $1 = accepts::amount
          0x65, 0x0, 0x0, 0x1,      # add $0 $0 $1      // $0 = $0 + $1
          0x81, 0x0, 0x2,           # psave $0 &2       // p.storage::supply = $0
          0x80, 0x0, 0x3,           # pload $0 &3       // $0 = p.storage::balances
          0x04, 0x2, 0x1,           # obtain $2 &1      // $2 = accepts::addr
          0x53, 0x3, 0x0, 0x2,      # getidx $3 $0 $2   // $3 = $0[$2]
          0x65, 0x3, 0x3, 0x1,      # add $3 $3 $1      // $3 = $3 + $1
          0x54, 0x0, 0x2, 0x3,      # setidx $0 $2 $3   // $0[$2] = $3
          0x81, 0x0, 0x3,           # psave $0 &3       // p.storage::balances = $0
          0x29, 0x0, 0x1,           # pmake $0 0x1      // $0 = make(bool)
          0x62, 0x0, 0x0,           # not $0 $0         // $0 = !$0
          0x05, 0x0, 0x0,           # yield $0 &0       // returns::ok = $0
        ]

  - ptr : 13
    kind: routine
    deps: [ 0 ]
    data:
      name    : Burn!
      kind    : invokable
      accepts :
        - slot : 0
          label: amount
          type : uint64
        - slot : 1
          label: addr
          type : address
      returns :
        - slot : 0
          label: ok
          type : bool
      executes:
        bin: [
          0x80, 0x0, 0x3,       # pload $0 &3       // $0 = storage::balances
          0x04, 0x1, 0x1,       # obtain $1 &1      // $1 = accepts::addr
          0x53, 0x2, 0x0, 0x1,  # getidx $2 $0 $1   // $2 = $0[$1]
          0x04, 0x3, 0x0,       # obtain $3 &0      // $3 = accepts::amount
          0x44, 0x4, 0x3, 0x2,  # lt $4 $3 $2       // $4 = $3 < $2
          0x11, 0x5, 0xA,       # ldptr1 $5 0xA     // $5 = Ptr(0xA)
          0x03, 0x5, 0x4,       # jumpi $5 $4       // if $4 -> jump to line $5 (0xA)
          0x29, 0x0, 0x1,       # pmake $0 0x1      // $0 = make(bool)
          0x05, 0x0, 0x0,       # yield $0 &0       // returns::ok = $0
          0x0,                  # term              // terminate routine
          0x1,                  # dest              // jump destination (line 0xA)
          0x66, 0x4, 0x2, 0x3,  # sub $4 $2 $3      // $4 = $2 - $3
          0x54, 0x0, 0x1, 0x4,  # setidx $0 $1 $4   // $0[$1] = $4
          0x81, 0x0, 0x3,       # psave $0 &3       // storage::balances = $0
          0x80, 0x0, 0x2,       # pload $0 $2       // $0 = storage::supply
          0x66, 0x0, 0x0, 0x3,  # sub $0 $0 $3      // $0 = $0 - $3
          0x81, 0x0, 0x2,       # psave $0 &2       // storage::supply = $0
          0x29, 0x0, 0x1,       # pmake $0 0x1      // $0 = make(bool)
          0x62, 0x0, 0x0,       # not $0 $0         // $0 = !$0
          0x05, 0x0, 0x0,       # yield $0 &0       // returns::ok = $0
        ]
