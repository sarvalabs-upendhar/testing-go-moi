syntax="proto3";
package ktypes;
option go_package="/ktypes";


message Student {

}





message Account {
    uint64 nonce=1;
    uint32  acctype=2;
    bytes balance=3;
    bytes assetapprovals=4;
    bytes contexthash=5;
    bytes storage=6;
    bytes logicroot=7;
    bytes  fileroot=8;
  
}

message BehaviouralContextObject {

    repeated string List=1;
    bytes Next=2;  
}

message RandomContextObject {
    repeated string List=1;
    bytes Next=2;
}

message BootstrapContextObject {
    repeated string List=1;
    bytes Next=2;
}

message Peers {
    repeated string list=1;
}
