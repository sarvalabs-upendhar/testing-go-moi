  - name: Ensure AWS CLI is installed on Ubuntu 22.04
    package:
      name: awscli
      state: present
    become: yes
    when:
    - ansible_facts["distribution"] == "Ubuntu" and ansible_facts["distribution_version"] == "22.04"

  - name: Ensure snapd is installed
    apt:
      name: snapd
      state: present
      update_cache: yes
    become: yes
    when:
    - ansible_facts["distribution"] == "Ubuntu" and ansible_facts["distribution_version"] == "24.04"

  - name: Install AWS CLI v2 via Snap
    snap:
      name: aws-cli
      state: present
      classic: true
    become: yes
    when:
    - ansible_facts["distribution"] == "Ubuntu" and ansible_facts["distribution_version"] == "24.04"
