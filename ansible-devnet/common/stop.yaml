- name: Write stop script on Servers
  shell: |
    cat > /home/ubuntu/{{ file_name }} << 'EOF'
    #!/bin/bash
    docker container prune -f
    docker compose -f /home/ubuntu/stack/bootnode/docker-compose.yml down
    EOF
    chmod 0755 /home/ubuntu/{{ file_name }}
  become: yes
  become_user: ubuntu

- name: Run stop script on servers
  shell: "/home/ubuntu/{{ file_name }}"
  become: yes
  become_user: ubuntu
