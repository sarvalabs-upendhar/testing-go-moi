- name: Copy stop script on Servers
  template:
    src: "{{ playbook_dir }}/scripts/{{ file_name }}"
    dest: "/home/ubuntu/{{ file_name }}"
    owner: "{{ owner }}"
    group: "{{ group }}"
    mode: "{{ mode }}"
  become: yes
  become_user: ubuntu

- name: Run stop script on servers
  shell: "./{{ file_name }}"
  args:
    chdir: "/home/ubuntu"
  become: yes
  become_user: ubuntu
