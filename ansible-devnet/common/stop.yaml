- name: Write stop script on Servers
  shell: |
    cat > /home/ubuntu/{{ file_name }} << 'SCRIPT'
    #!/bin/bash
    set -euo pipefail

    echo "Pruning stopped containers..."
    docker container prune -f

    echo "Stopping service..."
    docker compose -f /home/ubuntu/stack/{{ service_name }}/docker-compose.yml down

    echo "Stop complete."
    SCRIPT
    chmod 0755 /home/ubuntu/{{ file_name }}
  become: yes
  become_user: ubuntu

- name: Run stop script on servers
  shell: "/home/ubuntu/{{ file_name }}"
  become: yes
  become_user: ubuntu
