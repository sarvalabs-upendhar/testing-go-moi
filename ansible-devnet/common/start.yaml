- name: Write start script on Servers
  shell: |
    cat > /home/ubuntu/{{ file_name }} << 'SCRIPT'
    #!/bin/bash
    set -euo pipefail

    COMPOSE_FILE="/home/ubuntu/stack/{{ service_name }}/docker-compose.yml"

    echo "Pulling latest image..."
    docker compose -f "$COMPOSE_FILE" pull || true

    echo "Restarting containers..."
    docker compose -f "$COMPOSE_FILE" up -d

    echo "Start complete."
    SCRIPT
    chmod 0755 /home/ubuntu/{{ file_name }}
  become: yes
  become_user: ubuntu
