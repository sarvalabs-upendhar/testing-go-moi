- name: Write start script on Servers
  shell: |
    cat > /home/ubuntu/{{ file_name }} << 'SCRIPT'
    #!/bin/bash
    set -euo pipefail

    COMPOSE_FILE="/home/ubuntu/stack/bootnode/docker-compose.yml"

    echo "Pulling latest bootnode image..."
    docker compose -f "$COMPOSE_FILE" pull

    echo "Restarting bootnode container..."
    docker compose -f "$COMPOSE_FILE" up -d

    echo "Bootnode upgrade complete."
    SCRIPT
    chmod 0755 /home/ubuntu/{{ file_name }}
  become: yes
  become_user: ubuntu

- name: Run start script on servers
  shell: "/home/ubuntu/{{ file_name }}"
  become: yes
  become_user: ubuntu
