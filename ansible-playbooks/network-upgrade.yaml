---
# Define variables for the deployment options
- name: Run Deployment
  hosts: all
  gather_facts: false
  vars:
    deployment_option: "{{ lookup('env', 'deployment_option') | default('Full_Deployment') }}"  # Default to 'Full_Deployment' if not set

  tasks:
    - name: Print deployment option
      debug:
        msg: "Deployment Option: {{ deployment_option }}"
     

- name: Set timestamp
  hosts: all
  gather_facts: false
  tasks:
    - name: Set timestamp as a fact
      set_fact:
        timestamp: "{{ lookup('pipe', 'date +%Y-%m-%d-%H') }}"
    - name: Echo the timestamp
      debug:
        msg: "The timestamp is: {{ timestamp }}"

#################################
## Docker stop on devnet servers #
#################################

- name: Run devnet_stop.sh on the devnet server
  hosts: devnet-servers
  tasks:
    - name: Copy devnet_stop.sh to the devnet server
      copy:
        src: "{{ playbook_dir }}/scripts/devnet_stop.sh"
        dest: "/home/moichain/devnet_stop.sh"
        owner: moichain
        group: moichain
        mode: '0755'
      become_user: moichain
      when: deployment_option in ['Full_Deployment', 'Quick_Deployment', 'Config_Update_Only', 'Genesis_Update_Only']

    - name: Run devnet_stop.sh on the devnet server
      shell: "./devnet_stop.sh"
      args:
        chdir: "/home/moichain"
      become_user: moichain
      when: deployment_option in ['Full_Deployment', 'Quick_Deployment', 'Config_Update_Only', 'Genesis_Update_Only']

###########################################################
# Backup folder on devnet backup servers and upload to S3 #
###########################################################

- name: Backup and upload to S3
  hosts: devnet-backup-servers
  gather_facts: true
  tasks:    
    - name: Ensure AWS CLI is installed
      become: yes
      become_user: root
      become_method: sudo
      vars:
        ansible_become_pass: "{{ SUDO_PASSWORD }}"
      package:
        name: awscli
        state: present
      when: 
      - ansible_facts['distribution'] == 'Ubuntu' and ansible_facts['distribution_version'] == '22.04'
      - deployment_option in ['Full_Deployment', 'Config_Update_Only']

    - name: Ensure snapd is installed
      become: yes
      become_user: root
      vars:
        ansible_become_pass: "{{ SUDO_PASSWORD }}"
      apt:
        name: snapd
        state: present
        update_cache: yes
      when: 
      - ansible_facts['distribution'] == 'Ubuntu' and ansible_facts['distribution_version'] == '24.04'
      - deployment_option in ['Full_Deployment', 'Config_Update_Only']

    - name: Install AWS CLI v2 via Snap
      become: yes
      become_user: root
      vars:
        ansible_become_pass: "{{ SUDO_PASSWORD }}"
      snap:
        name: aws-cli
        state: present
        classic: true
      when: 
      - ansible_facts['distribution'] == 'Ubuntu' and ansible_facts['distribution_version'] == '24.04'
      - deployment_option in ['Full_Deployment', 'Config_Update_Only']

    - name: Ensure backup directory exists
      become_user: moichain
      file:
        path: "{{ backup_dir }}"
        state: directory
        owner: moichain
        group: moichain
        mode: '0755'
      when: deployment_option in ['Full_Deployment', 'Config_Update_Only']

    - name: Backup directories
      become_user: moichain
      loop: "{{ directories_to_backup }}"
      loop_control:
        label: "{{ item.name }}"
      command: >
        tar czf {{ backup_dir }}/test_{{ inventory_hostname }}_{{ item.name }}_{{ timestamp }}.tar.gz {{ item.path }}
      register: backup_result
      failed_when: backup_result.rc != 0
      changed_when: backup_result.rc == 0
      when: deployment_option in ['Full_Deployment', 'Config_Update_Only']

    - name: Upload backups to S3 with timestamp
      become_user: moichain
      shell: |
            set -euo pipefail
            aws s3 cp {{ backup_dir }}/test_{{ inventory_hostname }}_{{ item.name }}_{{ timestamp }}.tar.gz \
            s3://{{ aws_bucket }}/{{ group_names[0] }}-backup/{{ inventory_hostname }}/{{ timestamp }}/{{ item.name }}_{{ timestamp }}.tar.gz
      args:
        executable: /bin/bash
      with_items: "{{ directories_to_backup }}"
      loop_control:
          label: "{{ item.name }}"
      environment:
        AWS_ACCESS_KEY_ID: "{{ AWS_ACCESS_KEY_ID }}"
        AWS_SECRET_ACCESS_KEY: "{{ AWS_SECRET_ACCESS_KEY }}"
        AWS_DEFAULT_REGION: "{{ AWS_DEFAULT_REGION }}"
      when: deployment_option in ['Full_Deployment', 'Config_Update_Only']

#################################################
# update docker compose file on a devnet server #
#################################################

- name: Generate docker-compose.yaml file for devnet
  hosts: devnet-servers
  become: true
  become_user: moichain
  tasks:
    - name: Create docker-compose.yaml from template
      template:
        src: "docker-compose-template.yaml.j2"
        dest: "/home/moichain/stack/moipod/docker-compose.yml"
      when: deployment_option in ['Full_Deployment', 'Quick_Deployment', 'Config_Update_Only', 'Genesis_Update_Only']



#########################################
# update config file on a devnet server #
#########################################

- name: Update ports in config.json on a single devnet server
  hosts: devnet-servers
  become: true
  become_user: moichain
  tasks:
  - name: Generate config.json files using the template
    template:
      src: "config_template.json.j2"
      dest: "/home/moichain/shared/moipod/test_{{ item }}/config.json"
    loop: "{{ range(0, hostvars[inventory_hostname].no_of_pods) | list }}"
    loop_control:
      loop_var: item
    vars:
      node_port: "{{ base_port + item }}"
      prometheus_port: "{{ base_prometheus_port + item }}"
      jsonrpc_port: "{{ base_jsonrpc_port + item }}"
    when: deployment_option in ['Full_Deployment', 'Config_Update_Only'] 


##########################################
# update "genesis" file on devnet server #
##########################################

- name: Update genesis.json file on devnet servers
  hosts: devnet-servers
  
  # become: true
  gather_facts: true
  tasks:
  - name: Ensure AWS CLI is installed on Ubuntu 22.04
    become: yes
    become_user: root
    become_method: sudo
    vars:
      ansible_become_pass: "{{ SUDO_PASSWORD }}"
    package:
      name: awscli
      state: present
    when: 
    - ansible_facts['distribution'] == 'Ubuntu' and ansible_facts['distribution_version'] == '22.04'
    - deployment_option in ['Full_Deployment', 'Genesis_Update_Only']

  - name: Ensure snapd is installed
    become: yes
    become_user: root
    become_method: sudo
    vars:
      ansible_become_pass: "{{ SUDO_PASSWORD }}"
    apt:
      name: snapd
      state: present
      update_cache: yes
    when: 
    - ansible_facts['distribution'] == 'Ubuntu' and ansible_facts['distribution_version'] == '24.04'
    - deployment_option in ['Full_Deployment', 'Genesis_Update_Only']

  - name: Install AWS CLI v2 via Snap
    become: yes
    become_user: root
    become_method: sudo
    vars:
      ansible_become_pass: "{{ SUDO_PASSWORD }}"
    snap:
      name: aws-cli
      state: present
      classic: true
    when: 
    - ansible_facts['distribution'] == 'Ubuntu' and ansible_facts['distribution_version'] == '24.04'
    - deployment_option in ['Full_Deployment', 'Genesis_Update_Only']
    
  - name: Download genesis.json from S3 bucket
    become_user: moichain
    shell: |
      aws s3 cp s3://{{ s3_bucket_genesis }}/{{ s3_file_genesis }} {{ local_temp_path_genesis }}
    args:
      executable: /bin/bash
    environment:
      AWS_ACCESS_KEY_ID: "{{ AWS_ACCESS_KEY_ID }}"
      AWS_SECRET_ACCESS_KEY: "{{ AWS_SECRET_ACCESS_KEY }}"
      AWS_DEFAULT_REGION: "{{ AWS_DEFAULT_REGION }}"
    when: deployment_option in ['Full_Deployment', 'Genesis_Update_Only']
 
  - name: Backup the existing genesis.json file (if exists)
    become_user: moichain
    copy:
      src: "{{ target_path_genesis }}"
      dest: "{{ target_path_genesis }}.bak"
      remote_src: true
    ignore_errors: true
    when: deployment_option in ['Full_Deployment', 'Genesis_Update_Only']

  - name: Replace the genesis.json file
    become_user: moichain
    copy:
      src: "{{ local_temp_path_genesis }}"
      dest: "{{ target_path_genesis }}"
      remote_src: true
      owner: moichain
      group: moichain
      mode: '0644'
    when: deployment_option in ['Full_Deployment', 'Genesis_Update_Only']

  - name: Cleanup temporary genesis.json file
    become_user: moichain
    file:
      path: "{{ local_temp_path_genesis }}"
      state: absent
    when: deployment_option in ['Full_Deployment', 'Genesis_Update_Only']


##################################
# Docker start on devnet servers #
##################################

- name: Run devnet_start.sh on the devnet server
  hosts: devnet-servers
  tasks:
  - name: Copy devnet_start.sh to the devnet server
    copy:
      src: "{{ playbook_dir }}/scripts/devnet_start.sh"
      dest: "/home/moichain/devnet_start.sh"
      owner: moichain
      group: moichain
      mode: '0755'
    become_user: moichain
    when: deployment_option in ['Full_Deployment', 'Quick_Deployment', 'Config_Update_Only', 'Genesis_Update_Only']

  - name: Run devnet_start.sh on the devnet server
    shell: "./devnet_start.sh"
    args:
      chdir: "/home/moichain"
    become_user: moichain
    when: deployment_option in ['Full_Deployment', 'Quick_Deployment', 'Config_Update_Only', 'Genesis_Update_Only']

