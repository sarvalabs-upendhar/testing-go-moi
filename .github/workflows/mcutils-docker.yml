name: McUtils Publish to Registry

permissions:
  packages: write
  contents: read
  
on:
  workflow_call:
    secrets:
      ACCESS_TOKEN:
        required: true

  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3df4ab11eba7bda6032a0b82a6bb43b11571feac
      - name: Setup QEMU
        uses: docker/setup-qemu-action@68827325e0b33c7199eb31dd4e31fbe9023e06e3
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@2a1a44ac4aa01993040736bd95bb470da1a38365
      - name: Login to Registry
        uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ACCESS_TOKEN }}
          
      - name: Build mcutils Image
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09
        with:
          context: .
          file: ./docker/mcutils-dockerfile.amd64
          push: true
          tags: 'ghcr.io/sarvalabs/mcutils:latest'
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            TARGET_ARCH=amd64
