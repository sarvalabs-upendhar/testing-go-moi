name: Go Test
on:
  workflow_call:
    secrets:
      ACCESS_TOKEN:
        required: true
      CODECOV_TOKEN:
        required: true

  workflow_dispatch: {}

jobs:
  tests:
    name: go test
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: github.com/sarvalabs/*
      ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install and setup go
        uses: actions/setup-go@v4
        with:
          go-version: 1.18.x

      - name: Configure git
        run: git config --global url.https://$ACCESS_TOKEN@github.com/.insteadOf https://github.com/

      - name: Run tests
        run: go test -v -race -coverprofile coverage.out -timeout 10m $(go list ./... | grep -v /moiclient)

      - name: Upload coverage file to codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          flags: unittests
