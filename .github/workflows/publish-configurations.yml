name: Publish custom moipod configurations at OS and bin level

on:
  release:
    types: [released]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    
    env:
      ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
    
    steps:
      - name: Checkout go-moi code
        # https://github.com/actions/checkout/releases/tag/v4.0.0
        uses: actions/checkout@44c2b7a8a4ea60a981eaca3cf939b5f4305c123b # v4.0.0
        with:
          token: ${{ secrets.ACCESS_TOKEN }}

      - name: Publish config_instructions
        run: |
            ls -la
            npm -g install wrangler
            CLOUDFLARE_API_TOKEN=${{ secrets.CF_API }} CLOUDFLARE_ACCOUNT_ID=${{ secrets.CF_ACCOUNT }} \
              wrangler r2 object put moichain/config_instructions-${{github.ref_name}}.yml --file=./tooling/feiyu/config_instructions.yml
        shell: bash

      - name: Publish os_instructions
        run: |
            npm -g install wrangler
            ls -la
            CLOUDFLARE_API_TOKEN=${{ secrets.CF_API }} CLOUDFLARE_ACCOUNT_ID=${{ secrets.CF_ACCOUNT }} \
              wrangler r2 object put moichain/os_instructions-${{github.ref_name}}.sh --file=./tooling/feiyu/os_instructions.sh
        shell: bash
