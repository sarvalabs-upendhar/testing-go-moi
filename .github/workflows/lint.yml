name: GO Lint
on:
  workflow_call:
    secrets:
      ACCESS_TOKEN:
        required: true

  workflow_dispatch: {}

jobs:
  linter:
    name: go lint
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: github.com/sarvalabs/*
      ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@ac593985615ec2ede58e132d2e21d2b1cbd6127c

      - name: Install and setup go
        uses: actions/setup-go@4d34df0c2316fe8122ab82dc22947d607c0c91f9
        with:
          go-version: 1.18.x
            
      - name: Configure git
        run: git config --global url.https://$ACCESS_TOKEN@github.com/.insteadOf https://github.com/
    
      # fixed issue https://github.com/golangci/golangci-lint/issues/3862
      - name: Set GOROOT
        run: echo "GOROOT=$(go env GOROOT)" > "$GITHUB_ENV"
        
      - name: Install and run golangci-lint
        uses: golangci/golangci-lint-action@08e2f20817b15149a52b5b3ebe7de50aff2ba8c5 # stable
        with:
          version: latest
          skip-cache: true
          skip-pkg-cache: true
          skip-build-cache: true
