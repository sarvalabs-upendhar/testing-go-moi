name: GO Lint
on:
  workflow_call:
    secrets:
      ACCESS_TOKEN:
        required: true

  workflow_dispatch: {}

jobs:
  linter:
    name: go lint
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: github.com/sarvalabs/*
      ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}

    steps:
      - name: Checkout
        # https://github.com/actions/checkout/releases/tag/v4.0.0
        uses: actions/checkout@3df4ab11eba7bda6032a0b82a6bb43b11571feac # v4.0.0

      - name: Install and setup go
        # https://github.com/actions/setup-go/releases/tag/v4.1.0
        uses: actions/setup-go@93397bea11091df50f3d7e59dc26a7711a8bcfbe # v4.1.0
        with:
          go-version: 1.20.x
            
      - name: Configure git
        run: git config --global url.https://$ACCESS_TOKEN@github.com/.insteadOf https://github.com/
    
      # fixed issue https://github.com/golangci/golangci-lint/issues/3862
      - name: Set GOROOT
        run: echo "GOROOT=$(go env GOROOT)" > "$GITHUB_ENV"
        
      - name: Install and run golangci-lint
        # https://github.com/golangci/golangci-lint-action/releases/tag/v3.7.0
        uses: golangci/golangci-lint-action@3a919529898de77ec3da873e3063ca4b10e7f5cc # v3.7.0
        with:
          version: v1.52.2
          skip-cache: true
          skip-pkg-cache: true
          skip-build-cache: true
