name: GO Lint
on:
  workflow_call:
    secrets:
      ACCESS_TOKEN:
        required: true

  workflow_dispatch: {}

jobs:
  linter:
    name: go lint
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: github.com/sarvalabs/*
      ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@3df4ab11eba7bda6032a0b82a6bb43b11571feac

      - name: Install and setup go
        uses: actions/setup-go@fac708d6674e30b6ba41289acaab6d4b75aa0753
        with:
          go-version: 1.20.x
            
      - name: Configure git
        run: git config --global url.https://$ACCESS_TOKEN@github.com/.insteadOf https://github.com/
    
      # fixed issue https://github.com/golangci/golangci-lint/issues/3862
      - name: Set GOROOT
        run: echo "GOROOT=$(go env GOROOT)" > "$GITHUB_ENV"
        
      - name: Install and run golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: v1.52.2
          skip-cache: true
          skip-pkg-cache: true
          skip-build-cache: true
