name: Network Upgrade Babylon
on:

  workflow_dispatch:
    inputs:
      image_tag:
        description: "Specify the image/release tag"
        required: true
        default: "latest"       

env: 
  BRANCH_NAME: ${{ github.ref_name }}

jobs:
  check-permissions:
    runs-on: ubuntu-latest
    steps:
      - name: Check if the actor is an admin
        id: check_permissions
        uses: actions/github-script@v6
        with:
          script: |
            const response = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor,
            });
            const permission = response.data.permission;
            console.log(`Actor permission level: ${permission}`);
            core.setOutput("is_admin", permission === "admin");

    outputs:
      is_admin: ${{ steps.check_permissions.outputs.is_admin }}

  publish:
    if: ${{ needs.check-permissions.outputs.is_admin == 'true' }}
    runs-on: ubuntu-latest
    needs: check-permissions

    steps:
      - name: Checkout
        uses: actions/checkout@44c2b7a8a4ea60a981eaca3cf939b5f4305c123b # v4.0.0
        with:
          ref: ${{ github.event.inputs.image_tag }} # Checkout the specified tag

      - name: Verify checked-out version
        run: git describe --tags
        
      - name: Login to Registry
        uses: docker/login-action@e92390c5fb421da1463c202d546fed0ec5c39f20 # v3.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ACCESS_TOKEN }}
          logout: true

      - name: Build, & Push moipod container image ( pr_merge_event )
        uses: docker/build-push-action@2cdde995de11925a030ce8070c3d77a52ffcf1c0 # v5.3.0
        with:
          context: .
          push: true
          file: ./docker/moipod/internal.amd64
          tags: "ghcr.io/sarvalabs/moipod:${{ github.event.inputs.image_tag }}"
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            ACCESS_TOKEN=${{ secrets.ACCESS_TOKEN }}

  ansible-playbook:
    if: ${{ needs.check-permissions.outputs.is_admin == 'true' }}
    runs-on: ubuntu-latest
    needs: [check-permissions, publish]

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set deployment option as an environment variable
      - name: Set Deployment Option
        id: set_option
        run: |
          echo "DEPLOYMENT_OPTION=Full_Deployment" >> $GITHUB_ENV


      # Step 3: Connect to the jump server and execute the playbook
      - name: Run Ansible Playbook on Jump Server
        uses: appleboy/ssh-action@334f9259f2f8eb3376d33fa4c684fff373f2c2a6
        with:
          host: ${{ secrets.BABYLON_NETWORK_UPGRADE_HOST }}
          username: ${{ secrets.BABYLON_NETWORK_UPGRADE_USER }}
          key: ${{ secrets.BABYLON_NETWORK_UPGRADE_PRIVATE_KEY }}
          port: ${{ secrets.BABYLON_NETWORK_UPGRADE_PORT }}
          script: |
            echo "Starting playbook execution..."
            cd /home/go-moi
            echo ${{ github.ref_name }}
            echo "Pulling latest changes from branch: ${{ github.ref_name }}"
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}
            # Export AWS credentials as environment variables
            export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            export AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION }}
            aws s3 cp s3://babylon-config-template/config_template.json.j2 /tmp/config_template.json.j2
            echo "${{ vars.BABYLON_NODE_INVENTORY_FILE }}" | base64 -d > /tmp/node.yml
            cat /tmp/node.yml
            # Run the Ansible playbook with extra vars
            ansible-playbook -i /tmp/node.yml ansible-babylon/network-upgrade.yaml -f 10 \
            --extra-vars "ansible_ssh_private_key_file=/root/.ssh/id_rsa" \
            -e "config_template_path=/tmp/config_template.json.j2 AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION }} deployment_option=${{ env.DEPLOYMENT_OPTION }} SUDO_PASSWORD="" image_tag=${{ github.event.inputs.image_tag }}"
