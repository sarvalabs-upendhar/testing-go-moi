name: Network Upgrade

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Select target environment"
        required: true
        type: choice
        options:
          - testing

      deployment_option:
        description: "Choose deployment type"
        required: false
        type: choice
        default: Full_Deployment
        options:
          - Quick_Deployment
          - Full_Deployment
          - Genesis_Update_Only
          - Config_Update_Only

      clean_db:
        description: 'Clean database before deployment'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  BRANCH_NAME: ${{ github.ref_name }}

jobs:
  publish_image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ACCESS_TOKEN }}

      - name: Build & Push moipod container image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          file: ./docker/moipod/internal.amd64
          tags: ghcr.io/sarvalabs-upendhar/moipod:latest
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            ACCESS_TOKEN=${{ secrets.ACCESS_TOKEN }}

  ansible_deploy:
    name: Ansible Deploy
    needs: publish_image
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set Deployment Variables
        run: |
          echo "TARGET=${{ github.event.inputs.target }}" >> $GITHUB_ENV
          echo "DEPLOYMENT_OPTION=${{ github.event.inputs.deployment_option || 'Full_Deployment' }}" >> $GITHUB_ENV
          echo "CLEAN_DB=${{ github.event.inputs.clean_db || 'true' }}" >> $GITHUB_ENV

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.NODE1_IP }} >> ~/.ssh/known_hosts

      - name: Load Inventory
        run: |
          echo "${{ vars.TESTING_NODES_INVENTORY }}" > /tmp/node.yml

      - name: Download config template from S3
        run: |
          aws s3 cp s3://moi-bootnode-upendhar/config_template.json.j2 /tmp/config_template.json.j2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Write Ansible config
        run: |
          {
            echo '[defaults]'
            echo 'host_key_checking = False'
            echo 'remote_tmp = /tmp/.ansible-${USER}/tmp'
            echo 'pipelining = True'
            echo 'forks = 10'
            echo ''
            echo '[ssh_connection]'
            echo 'scp_if_ssh = True'
            echo 'ssh_args = -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o ControlMaster=auto -o ControlPersist=600'
          } > /tmp/ansible.cfg

      - name: Run Ansible Playbook
        run: |
          echo "Starting network upgrade playbook execution..."
          ANSIBLE_CONFIG=/tmp/ansible.cfg ansible-playbook \
            -i /tmp/node.yml \
            ansible-devnet/network-upgrade.yaml \
            -f 10 \
            -e "ansible_remote_tmp=/tmp/.ansible-github/tmp" \
            -e "deployment_option=${{ env.DEPLOYMENT_OPTION }}" \
            -e "clean_db=${{ env.CLEAN_DB }}" \
            -e "SUDO_PASSWORD=''" \
            -e "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" \
            -e "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            -e "AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION }}" \
            -e "ghcr_pat=${{ secrets.ACCESS_TOKEN }}" \
            -e "ghcr_user=${{ secrets.GH_USER }}"
