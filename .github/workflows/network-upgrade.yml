# ---------------------------------
# Workflow for testing environment
# ---------------------------------
name: Network Upgrade

on:
  workflow_dispatch:
    inputs:
      deployment_option:
        description: "Choose deployment type"
        required: false
        type: choice
        default: Full_Deployment
        options:
          - Quick_Deployment
          - Full_Deployment
          - Genesis_Update_Only
          - Config_Update_Only

      clean_db:
        description: 'Clean database before deployment'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  BRANCH_NAME: ${{ github.ref_name }}

# ---------------------------------
# Build & Push Docker Image
# ---------------------------------
jobs:

  publish_image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ACCESS_TOKEN }}
          logout: true

      - name: Build & Push moipod container image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          file: ./docker/moipod/internal.amd64
          tags: ghcr.io/sarvalabs/moipod:latest
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            ACCESS_TOKEN=${{ secrets.ACCESS_TOKEN }}

# ---------------------------------
# Ansible Deploy
# ---------------------------------
  ansible_deploy:
    name: Ansible Deploy
    needs: publish_image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      # ✅ REMOVED: id-token: write (was needed for Teleport only)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Set Deployment Variables
      # -----------------------------
      - name: Set Deployment Variables
        run: |
          echo "DEPLOYMENT_OPTION=${{ github.event.inputs.deployment_option || 'Full_Deployment' }}" >> $GITHUB_ENV
          echo "CLEAN_DB=${{ github.event.inputs.clean_db || 'true' }}" >> $GITHUB_ENV

      # -----------------------------
      # Setup SSH Key
      # -----------------------------
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.NODE1_IP }} >> ~/.ssh/known_hosts
          ssh-keyscan -H ${{ secrets.NODE2_IP }} >> ~/.ssh/known_hosts

      # -----------------------------
      # Load Inventory from GitHub Variable
      # -----------------------------
      - name: Load Inventory
        run: |
          echo "${{ vars.TESTING_NODES_INVENTORY }}" > /tmp/node.yml

      # -----------------------------
      # Download config template from S3
      # -----------------------------
      - name: Download config template from S3
        run: |
          export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
          export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          export AWS_DEFAULT_REGION="${{ secrets.AWS_DEFAULT_REGION }}"

          aws s3 cp s3://${{ secrets.GENESIS_BUCKET }}/config_template.json.j2 /tmp/config_template.json.j2

      # -----------------------------
      # Write Ansible Config
      # -----------------------------
      - name: Write Ansible config
        run: |
          cat > /tmp/ansible.cfg <<EOF
          [defaults]
          host_key_checking = False
          inventory = /tmp/node.yml
          remote_tmp = /tmp/.ansible-${USER}/tmp
          pipelining = True
          forks = 15
          callbacks_enabled = profile_tasks
          task_output_limit = 30

          [ssh_connection]
          scp_if_ssh = True
          ssh_args = -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o ControlMaster=auto -o ControlPersist=480s -o ControlPath=/tmp/ansible-ssh-%r@%h:%p
          EOF

      # -----------------------------
      # Run Ansible Playbook
      # -----------------------------
      - name: Run Ansible Playbook
        run: |
          set -e

          ANSIBLE_CONFIG=/tmp/ansible.cfg ansible-playbook \
            ansible-devnet/network-upgrade.yaml \
            -f 15 \
            -e "ansible_remote_tmp=/tmp/.ansible-moichain/tmp" \
            --extra-vars "deployment_option=${{ env.DEPLOYMENT_OPTION }} \
                          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
                          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
                          AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION }} \
                          clean_db=${{ env.CLEAN_DB }} \
                          ghcr_pat=${{ secrets.ACCESS_TOKEN }} \
                          ghcr_user=${{ secrets.GH_USER }}"
          # ✅ REMOVED: SUDO_PASSWORD from extra-vars (not needed with .pem auth)
