name: Continuous Integration
on:
  push:
    branches:
      - master
      - develop
    paths:
      - '**.go'

  pull_request:
    branches:
      - master
      - develop
    types:
      - opened
      - edited
    paths:
      - '**.go'

  workflow_call:
    secrets:
      ACCESS_TOKEN:
        required: true

  workflow_dispatch: {}

jobs:
  lint:
    name: Lint
    uses: ./.github/workflows/lint.yml
    secrets:
      ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}

  test:
    name: Test
    needs: lint
    uses: ./.github/workflows/test.yml
    secrets:
      ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
