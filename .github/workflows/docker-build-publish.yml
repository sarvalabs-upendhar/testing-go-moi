name: Build & Publish Docker Images to Dockerhub

on:
  workflow_dispatch:
    inputs:
      target_os:
        description: 'Select OS to build (linux, windows, all)'
        required: true
        default: 'all'
        type: choice
        options:
          - linux
          - windows
          - all

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push-linux:
    if: github.event.inputs.target_os == 'linux' || github.event.inputs.target_os == 'all'
    strategy:
      matrix:
        os: [rhel, ubuntu]
        arch: [amd64, arm64]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 🔹 Log in to DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DUSER }}
          password: ${{ secrets.DPASS }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Build & Push Docker Image (Linux)
        uses: docker/build-push-action@v5
        with:
          sbom: false
          provenance: false
          context: .
          push: true
          platforms: linux/${{ matrix.arch }}
          file: ./docker/linux/Dockerfile.${{ matrix.os }}.${{ matrix.arch }}
          tags: sarvalabs/moipod:${{ matrix.os }}-${{ matrix.arch }}-latest
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            ACCESS_TOKEN=${{ secrets.ACCESS_TOKEN }}

  build-and-push-windows:
    if: github.event.inputs.target_os == 'windows' || github.event.inputs.target_os == 'all'
    strategy:
      matrix:
        windows_version: [2019, 2022]
    runs-on: ${{ matrix.windows_version == 2022 && 'windows-2022' || 'windows-2019' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 🔹 Log in to DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DUSER }}
          password: ${{ secrets.DPASS }}

      - name: Build & Push Docker Image (Windows)
        shell: pwsh
        run: |
          $DOCKERHUB_TAG="sarvalabs/moipod:windows-amd64-${{ matrix.windows_version }}"
          
          docker build `
            --file ./docker/windows/Dockerfile-${{ matrix.windows_version }}.amd64 `
            --tag $DOCKERHUB_TAG `
            --build-arg GIT_COMMIT=${{ github.sha }} `
            --build-arg ACCESS_TOKEN="${{ secrets.ACCESS_TOKEN }}" .

          docker push $DOCKERHUB_TAG
