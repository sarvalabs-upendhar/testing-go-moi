---
name: push to ghcr

on:
  workflow_call:
    secrets:
      ACCESS_TOKEN:
        required: true

  workflow_dispatch: {}
    # inputs:
    #   buildImage: 
    #     description: |-
    #       which image you want to build?
    #     required: true
    #     type: choice
    #     default: "moipod"
    #     options:
    #       - moipod
    #       - mcutils
    #       - logiclab
          

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        # https://github.com/actions/checkout/releases/tag/v4.0.0
        uses: actions/checkout@44c2b7a8a4ea60a981eaca3cf939b5f4305c123b # v4.0.0

      - name: Login to Registry
        # https://github.com/docker/login-action/releases/tag/v3.0.0
        uses: docker/login-action@e92390c5fb421da1463c202d546fed0ec5c39f20 # v3.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ACCESS_TOKEN }}
          logout: true

      # - name: Build, & Push ${{ github.event.inputs.buildImage }} container image ( dispatch_event )
      #   if: github.event.pull_request.merged != true  && github.event_name == 'workflow_dispatch'
      #   # https://github.com/docker/build-push-action/releases/tag/v5.0.0
      #   uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
      #   with:
      #     context: .
      #     push: true
      #     file: ./docker/${{ github.event.inputs.buildImage }}/internal.amd64
      #     tags: "ghcr.io/sarvalabs/${{ github.event.inputs.buildImage }}:latest"
      #     build-args: |
      #       GIT_COMMIT=${{ github.sha }}
      #       ACCESS_TOKEN=${{ secrets.ACCESS_TOKEN }}

      - name: Build, & Push moipod container image ( pr_merge_event )
        # if: (github.event.pull_request.merged == true  || github.event.push == true) && github.event_name == 'workflow_call'
        # https://github.com/docker/build-push-action/releases/tag/v5.0.0
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: .
          push: true
          file: ./docker/moipod/internal.amd64
          tags: "ghcr.io/sarvalabs/moipod:latest"
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            ACCESS_TOKEN=${{ secrets.ACCESS_TOKEN }}
