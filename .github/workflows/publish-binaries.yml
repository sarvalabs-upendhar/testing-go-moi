name: Build and publish moipod binaries to distribution server

on:
  release:
    types: [released]
  workflow_dispatch: {}

jobs:
  publish:
    strategy:
      matrix:
          os: [ubuntu-latest, windows-latest, macos-13, macos-13-xlarge]
    
    runs-on: ${{ matrix.os }}
    
    env:
      ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
      GOPRIVATE: github.com/sarvalabs/*
    
    steps:
      - name: Checkout go-moi code
        uses: actions/checkout@44c2b7a8a4ea60a981eaca3cf939b5f4305c123b #v4.1.5
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          
      - name: Install and setup go
        uses: actions/setup-go@0c52d547c9bc32b1aa3301fd7a9cb496313a4491 #v5.0.0
        with:
          go-version: 1.20.8

      - name: Configure git
        run: git config --global url.https://sarvalabs:${{secrets.ACCESS_TOKEN}}@github.com/.insteadOf https://github.com/
        
      - name: Build moipod linux-amd64 binary
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: go build -o moipod-${{github.ref_name}}-linux-amd64 ./cmd/moipod/
      - name: Upload the linux binary to CloudFlare R2
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
            npm -g install wrangler
            CLOUDFLARE_API_TOKEN=${{ secrets.CF_API }} CLOUDFLARE_ACCOUNT_ID=${{ secrets.CF_ACCOUNT }} \
              wrangler r2 object put moichain/moipod-${{github.ref_name}}-linux-amd64 --file=./moipod-${{github.ref_name}}-linux-amd64
        shell: bash
          
      - name: Build moipod darwin-amd64 binary
        if: ${{ matrix.os == 'macos-13' }}
        run: go build -o moipod-${{github.ref_name}}-darwin-amd64 ./cmd/moipod/
      - name: Upload the darwin binary to CloudFlare R2
        if: ${{ matrix.os == 'macos-13' }}
        run: |
            npm -g install wrangler
            CLOUDFLARE_API_TOKEN=${{ secrets.CF_API }} CLOUDFLARE_ACCOUNT_ID=${{ secrets.CF_ACCOUNT }} \
              wrangler r2 object put moichain/moipod-${{github.ref_name}}-darwin-amd64 --file=./moipod-${{github.ref_name}}-darwin-amd64
        shell: bash

      - name: Build moipod darwin-arm64 binary
        if: ${{ matrix.os == 'macos-13-xlarge' }}
        run: go build -o moipod-${{github.ref_name}}-darwin-arm64 ./cmd/moipod/
      - name: Upload the darwin binary to CloudFlare R2
        if: ${{ matrix.os == 'macos-13-xlarge' }}
        run: |
            npm -g install wrangler
            CLOUDFLARE_API_TOKEN=${{ secrets.CF_API }} CLOUDFLARE_ACCOUNT_ID=${{ secrets.CF_ACCOUNT }} \
              wrangler r2 object put moichain/moipod-${{github.ref_name}}-darwin-arm64 --file=./moipod-${{github.ref_name}}-darwin-arm64
        shell: bash
        
      - name: Build moipod windows-amd64 executable
        if: ${{ matrix.os == 'windows-latest' }}
        run: go build -o moipod-${{github.ref_name}}-windows-amd64 ./cmd/moipod/
      - name: Upload the windows executable to CloudFlare R2
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
            npm -g install wrangler
            CLOUDFLARE_API_TOKEN=${{ secrets.CF_API }} CLOUDFLARE_ACCOUNT_ID=${{ secrets.CF_ACCOUNT }} \
              wrangler r2 object put moichain/moipod-${{github.ref_name}}-windows-amd64 --file=./moipod-${{github.ref_name}}-windows-amd64
        shell: bash
