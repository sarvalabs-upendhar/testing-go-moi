---
name: push-release-to-dockerhub

on:

  workflow_dispatch:
    inputs:
      buildImage: 
        description: |-
         version-tag? (i.e v22.04)
        required: true
        type: string
          
jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        # https://github.com/actions/checkout/releases/tag/v4.0.0
        uses: actions/checkout@3df4ab11eba7bda6032a0b82a6bb43b11571feac # v4.0.0

      - name: Login to Registry
        # https://github.com/docker/login-action/releases/tag/v3.0.0
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          logout: true

      - name: Build, & Push release-to-dockerhub image -> ${{ github.event.inputs.buildImage }}
        # https://github.com/docker/build-push-action/releases/tag/v5.0.0
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: .
          push: true
          file: ./docker/moipod/release.file
          tags: sarvalabs/moipod:${{ github.event.inputs.buildImage }}, sarvalabs/moipod:latest
          platforms: linux/amd64, linux/arm64/v8, linux/arm/v7, linux/arm/v6
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            ACCESS_TOKEN=${{ secrets.GITHUB_TOKEN }}
