---
name: push-release-to-dockerhub

on:

  workflow_dispatch:
    inputs:
      buildImage: 
        description: |-
         v0.2.5, v0.2.5-port
        required: true
        type: string
          
jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
      - 
        name: Checkout
        # https://github.com/actions/checkout/releases/tag/v4.1.1
        uses: actions/checkout@44c2b7a8a4ea60a981eaca3cf939b5f4305c123b # v4.1.5

      - 
        name: Login to Registry
        # https://github.com/docker/login-action/releases/tag/v3.0.0
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DUSER }}
          password: ${{ secrets.DPASS }}
          logout: true

      - 
        name: Setup QEMU
        # https://github.com/docker/setup-qemu-action/releases/tag/v3.0.0
        uses: docker/setup-qemu-action@68827325e0b33c7199eb31dd4e31fbe9023e06e3 # v3.0.0

      - 
        name: Setup Docker Buildx
        # https://github.com/docker/setup-buildx-action/releases/tag/v3.0.0
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build, & Push release-to-dockerhub image -> ${{ github.event.inputs.buildImage }}
        # https://github.com/docker/build-push-action/releases/tag/v5.0.0
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          file: ./docker/moipod/release.file
          tags: sarvalabs/moipod:${{ github.event.inputs.buildImage }}, sarvalabs/moipod:latest
          platforms: linux/amd64, linux/arm64/v8, linux/arm/v7, linux/arm/v6
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            ACCESS_TOKEN=${{ secrets.GITHUB_TOKEN }}
