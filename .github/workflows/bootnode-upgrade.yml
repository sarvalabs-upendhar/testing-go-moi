name: Bootnode Upgrade
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Select target environment"
        required: true
        type: choice
        options:
          - testing
env:
  BRANCH_NAME: ${{ github.ref_name }}
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ACCESS_TOKEN }}

      - name: Build & Push moipod container image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          file: ./docker/moipod/internal.amd64
          tags: ghcr.io/sarvalabs-upendhar/moipod:latest
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            ACCESS_TOKEN=${{ secrets.ACCESS_TOKEN }}

  ansible-playbook:
    runs-on: ubuntu-latest
    needs: [publish]
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.BOOTNODE_IP }} >> ~/.ssh/known_hosts

      - name: Load Inventory
        run: |
          echo "${{ vars.TESTING_BOOTNODE_INVENTORY }}" > /tmp/bootnode.yml

      - name: Write Ansible config
        run: |
          {
            echo '[defaults]'
            echo 'host_key_checking = False'
            echo 'remote_tmp = /tmp/.ansible-${USER}/tmp'
            echo 'pipelining = True'
            echo 'forks = 10'
            echo ''
            echo '[ssh_connection]'
            echo 'scp_if_ssh = True'
            echo 'ssh_args = -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o ControlMaster=auto -o ControlPersist=600'
          } > /tmp/ansible.cfg

      - name: Run Ansible Playbook
        run: |
          echo "Starting bootnode playbook execution..."
          ANSIBLE_CONFIG=/tmp/ansible.cfg ansible-playbook \
            -i /tmp/bootnode.yml \
            ansible-devnet/bootnode.yaml \
            -f 10 \
            -e "ansible_remote_tmp=/tmp/.ansible-github/tmp" \
            -e "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" \
            -e "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            -e "AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION }}" \
            -e "ghcr_pat=${{ secrets.ACCESS_TOKEN }}" \
            -e "ghcr_user=${{ secrets.GH_USER }}"
