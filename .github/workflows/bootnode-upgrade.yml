name: Bootnode Upgrade

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Select target environment"
        required: true
        type: choice
        options:
          - private-devnet
          - public-devnet

env:
  BRANCH_NAME: ${{ github.ref_name }}

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ACCESS_TOKEN }}
          logout: true

      - name: Build & Push moipod container image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          file: ./docker/moipod/internal.amd64
          tags: ghcr.io/sarvalabs-upendhar/moipod:latest
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            ACCESS_TOKEN=${{ secrets.ACCESS_TOKEN }}

  ansible-playbook:
    runs-on: ubuntu-latest
    needs: [publish]
    environment: ${{ github.event.inputs.target }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # -----------------------------
      # Set Network Variables
      # -----------------------------
      - name: Set network variables
        run: |
          if [[ "${{ github.event.inputs.target }}" == "public-devnet" ]]; then
            echo "TP_VERSION=16.2.1" >> $GITHUB_ENV
            echo "TP_TOKEN=github-join-token" >> $GITHUB_ENV
            echo "INVENTORY=${{ vars.PUBLIC_DEVNET_BOOTNODE_INVENTORY_FILE }}" >> $GITHUB_ENV
            echo "TARGET=public-devnet" >> $GITHUB_ENV
          else
            echo "TP_VERSION=16.5.15" >> $GITHUB_ENV
            echo "TP_TOKEN=github-ci-token" >> $GITHUB_ENV
            echo "INVENTORY=${{ vars.DEVNET_BOOTNODE_INVENTORY_FILE_UPDATED }}" >> $GITHUB_ENV
            echo "TARGET=private-devnet" >> $GITHUB_ENV
          fi

      - name: Install Teleport CLI
        uses: teleport-actions/setup@v1
        with:
          version: ${{ env.TP_VERSION }}

      - name: Authenticate via Teleport Machine ID
        uses: teleport-actions/auth@v2
        with:
          proxy: ${{ vars.TP_PROXY }}
          token: ${{ env.TP_TOKEN }}
          certificate-ttl: 2h
          anonymous-telemetry: 1

      - name: Run Ansible Playbook
        run: |
          echo "Starting bootnode playbook execution..."

          export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
          export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          export AWS_DEFAULT_REGION="${{ secrets.AWS_DEFAULT_REGION }}"
          export SUDO_PASSWORD="${{ secrets.SUDO_PASSWORD }}"

          # Decode inventory
          echo "$INVENTORY" | base64 -d > /tmp/bootnode.yml

          # Locate Machine ID directory
          MACHINE_ID_DIR=$(find /home/runner/work/_temp -name "ssh_config" -type f -exec dirname {} \; | head -1)

          # Common Ansible config
          cat > /tmp/ansible.cfg <<EOF
          [defaults]
          host_key_checking = False 
          inventory = /tmp/node.yml
          remote_tmp = /tmp/.ansible-${USER}/tmp
          pipelining = True
          EOF

          # Conditional differences
          if [[ "$TARGET" == "public-devnet" ]]; then

          echo "forks = 10" >> /tmp/ansible.cfg
          cat >> /tmp/ansible.cfg <<EOF
          [ssh_connection]
          scp_if_ssh = True
          ssh_args = -o ProxyCommand="tsh proxy ssh %h" -o IdentityFile="$MACHINE_ID_DIR/key" -o CertificateFile="$MACHINE_ID_DIR/key-cert.pub" -o ControlMaster=auto -o ControlPersist=600
          EOF

          else

          echo "forks = 15" >> /tmp/ansible.cfg
          echo "callbacks_enabled = profile_tasks" >> /tmp/ansible.cfg
          echo "task_output_limit = 30" >> /tmp/ansible.cfg
          cat >> /tmp/ansible.cfg <<EOF
          [ssh_connection]
          scp_if_ssh = True
          ssh_args = -F $MACHINE_ID_DIR/ssh_config -o ControlMaster=auto -o ControlPersist=480s -o ControlPath=/tmp/ansible-ssh-%r@%h:%p
          EOF

          fi

          # Run playbook
          ANSIBLE_CONFIG=/tmp/ansible.cfg ansible-playbook \
            -i /tmp/bootnode.yml \
            ansible-devnet/bootnode.yaml \
            -f 10 \
            -e "ansible_remote_tmp=/tmp/.ansible-github/tmp" \
            --extra-vars "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION }} SUDO_PASSWORD=${{ secrets.SUDO_PASSWORD }} ghcr_pat=${{ secrets.ACCESS_TOKEN }} ghcr_user=${{ secrets.GH_USER }}"
