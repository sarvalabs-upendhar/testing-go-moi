name: Go Test
on:
  push:
    branches:
      - develop
    paths:
      - '**.go'

  pull_request:
    branches:
      - master
      - develop
    types:
      - opened
      - edited
    paths:
      - '**.go'

jobs:
  tests:
    name: go test
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: github.com/sarvalabs/*
      ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install and setup go
        uses: actions/setup-go@v3
        with:
          go-version: 1.18.x

      - name: Configure git
        run: git config --global url.https://$ACCESS_TOKEN@github.com/.insteadOf https://github.com/

      - name: Run tests
        run: go test -v ./...