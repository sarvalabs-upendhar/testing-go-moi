    - ssh -i $CD_DEV_ID_RSA_149_102_155_207 -o StrictHostKeyChecking=no $CD_DEV_USER@$CD_DEV_IP_149_102_155_207 "if [ -d "~/moichain_repo" ]; then rm -rf ~/moichain_repo; fi"
    - scp -i $CD_DEV_ID_RSA_149_102_155_207 -r . $CD_DEV_USER@$CD_DEV_IP_149_102_155_207:~/moichain_repo
    - ssh -i $CD_DEV_ID_RSA_149_102_155_207 -o StrictHostKeyChecking=no $CD_DEV_USER@$CD_DEV_IP_149_102_155_207 "cd ~/moichain_repo && export CGO_CFLAGS='-O -D__BLST_PORTABLE__' && go build -o moichain"
